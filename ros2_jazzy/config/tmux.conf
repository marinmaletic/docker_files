# ──────────────────────────────────────────────────────────────────────────────
# tmux.conf — general purpose, ROS2-aware
# ──────────────────────────────────────────────────────────────────────────────

# ── Terminal ──────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── General ───────────────────────────────────────────────────────────────────
set -g history-limit 50000
set -g display-time 1500
set -g status-interval 5
set -g base-index 1           # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0         # no delay on Escape (important for vim/nano)

# ── Mouse ─────────────────────────────────────────────────────────────────────
set -g mouse on

# ── Keyboard navigation ───────────────────────────────────────────────────────
# Switch panes: Ctrl + arrow
bind -n C-Left  select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up    select-pane -U
bind -n C-Down  select-pane -D

# Switch windows: Shift + arrow
bind -n S-Left  previous-window
bind -n S-Right next-window

# Split panes intuitively
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window keeping current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded."

# ── Kill all panes (Ctrl+b then k) ────────────────────────────────────────────
bind-key k \
  confirm-before -p "Kill all panes? (y/n)" \
  "run-shell 'tmux list-panes -s -F \"#{pane_pid}\" | while read pid; do kill -9 \$pid 2>/dev/null; done'"

# ── Sync panes toggle (Ctrl+b then s) ────────────────────────────────────────
bind s \
    set synchronize-panes \; \
    display "Sync: #{?synchronize-panes,ON,OFF}"

# ── Quiet ─────────────────────────────────────────────────────────────────────
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour255

# Left: session name
set -g status-left "#[fg=colour255,bg=colour26,bold] #S #[fg=colour26,bg=colour234,nobold]"
set -g status-left-length 20

# Right: ROS_DOMAIN_ID | time | hostname
set -g status-right "#[fg=colour244]ROS_ID: #[fg=colour81]$ROS_DOMAIN_ID #[fg=colour244]| #[fg=colour255]%H:%M #[fg=colour244]| #[fg=colour255,bg=colour26] #H "
set -g status-right-length 60

# Window tabs
setw -g window-status-format         "#[fg=colour244,bg=colour234] #I:#W "
setw -g window-status-current-format "#[fg=colour255,bg=colour239,bold] #I:#W #[fg=colour239,bg=colour234]"
